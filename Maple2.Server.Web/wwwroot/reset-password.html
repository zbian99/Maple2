<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>冒险岛2 密码找回</title>
  <style>
    :root {
      --bg: #efe8d9;
      --panel: rgba(255, 251, 244, 0.95);
      --panel-border: rgba(87, 62, 37, 0.18);
      --text: #2f241b;
      --muted: #6e5a47;
      --accent: #8c4c29;
      --accent-strong: #6c381c;
      --success: #236848;
      --error: #9a2f2f;
      --shadow: rgba(64, 42, 23, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at right top, rgba(255, 203, 140, 0.70), transparent 28%),
        radial-gradient(circle at left bottom, rgba(210, 133, 86, 0.45), transparent 30%),
        linear-gradient(160deg, #f7efe2 0%, #eee0cb 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 460px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: 0 24px 60px var(--shadow);
      padding: 32px 28px 28px;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    h1 { margin: 0; font-size: 32px; line-height: 1.1; }
    .intro, .hint, .link-row { color: var(--muted); line-height: 1.6; }
    .intro { margin: 12px 0 18px; }
    .hint { margin: 12px 0 0; font-size: 13px; }
    .link-row { margin: 16px 0 0; font-size: 14px; }

    form { display: grid; gap: 14px; }

    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid rgba(109, 90, 71, 0.25);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
    }

    input:focus {
      outline: none;
      border-color: rgba(140, 76, 41, 0.82);
      box-shadow: 0 0 0 4px rgba(140, 76, 41, 0.12);
    }

    button {
      margin-top: 6px;
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      color: #fffaf3;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(108, 56, 28, 0.22);
    }

    button:disabled { cursor: wait; opacity: 0.7; }

    a {
      color: var(--accent-strong);
      font-weight: 600;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .status {
      min-height: 24px;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--error); }

    @media (max-width: 520px) {
      .card { padding: 26px 20px 22px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">冒险岛2账号</p>
    <h1>找回密码</h1>
    <p class="intro">请输入账号名，并填写 QQ号 或 手机号 中至少一项进行身份校验。校验通过后即可设置新密码。</p>

    <form id="reset-form">
      <label>
        账号名
        <input id="username" name="username" type="text" minlength="3" maxlength="16" autocomplete="username" required>
      </label>

      <label>
        QQ号（可选）
        <input id="qqNumber" name="qqNumber" type="text" inputmode="numeric" autocomplete="off">
      </label>

      <label>
        手机号（可选）
        <input id="phoneNumber" name="phoneNumber" type="text" inputmode="numeric" autocomplete="tel">
      </label>

      <label>
        新密码
        <input id="newPassword" name="newPassword" type="password" minlength="6" maxlength="72" autocomplete="new-password" required>
      </label>

      <label>
        确认新密码
        <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" maxlength="72" autocomplete="new-password" required>
      </label>

      <button id="submit" type="submit">重置密码</button>
    </form>

    <div id="status" class="status" aria-live="polite"></div>
    <p class="hint">QQ号和手机号至少填写一项。密码重置成功后，请回到游戏客户端使用新密码登录。</p>
    <p class="link-row"><a href="/">返回服务大厅</a>　|　还没有账号？<a href="/register.html">前往注册</a>　|　已有卡密？<a href="/recharge.html">前往点卡充值</a></p>
  </main>

  <script>
    const form = document.getElementById("reset-form");
    const submitButton = document.getElementById("submit");
    const status = document.getElementById("status");

    function setStatus(message, type) {
      status.textContent = message;
      status.className = type ? "status " + type : "status";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("", "");
      submitButton.disabled = true;

      const payload = {
        username: document.getElementById("username").value,
        qqNumber: document.getElementById("qqNumber").value,
        phoneNumber: document.getElementById("phoneNumber").value,
        newPassword: document.getElementById("newPassword").value,
        confirmPassword: document.getElementById("confirmPassword").value
      };

      try {
        const response = await fetch("/api/account/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        setStatus(result.message || "请求已完成。", response.ok ? "success" : "error");

        if (response.ok) {
          form.reset();
        }
      } catch (error) {
        setStatus("密码找回请求失败，请稍后再试。", "error");
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
